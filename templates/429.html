<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>429 - Terlalu Banyak Request</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
  .err-box { padding:48px 32px; }
  .err-code { font-family:'Orbitron',monospace; font-size:5rem; color:#ef4444; font-weight:900; line-height:1; }
  .err-title { font-size:1.4rem; color:#fff; margin:16px 0 8px; font-weight:700; }
  .err-sub { color:rgba(255,255,255,0.5); font-size:0.95rem; line-height:1.7; }
  .btn-back { display:inline-block; margin-top:28px; padding:12px 32px; background:rgba(124,58,237,0.3);
    border:1px solid rgba(124,58,237,0.5); color:#a855f7; border-radius:12px;
    text-decoration:none; font-weight:700; transition:all 0.2s; }
  .btn-back:hover { background:rgba(124,58,237,0.5); }
</style>
</head>
<body>
<div id="main-site" class="visible">
  <div class="err-box">
    <div class="err-code">429</div>
    <div class="err-title">Terlalu Banyak Request</div>
    <div class="err-sub">
      Kamu mengirim terlalu banyak request dalam waktu singkat.<br>
      IP kamu diblokir sementara selama 5 menit.<br><br>
      Tunggu sebentar lalu coba lagi.
    </div>
    <a href="/" class="btn-back">Kembali ke Home</a>
  </div>
</div>
</body>
</html>
