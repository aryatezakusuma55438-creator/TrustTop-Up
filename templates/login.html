<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - TrustTop Up</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--bg);
  }
  .login-box {
    background: #0e0e1e;
    border: 1px solid rgba(124,58,237,0.35);
    border-radius: 24px;
    padding: 48px 36px;
    width: 100%;
    max-width: 400px;
  }
  .login-logo {
    text-align: center;
    font-family: 'Orbitron', monospace;
    font-size: 1.6rem;
    font-weight: 900;
    background: linear-gradient(90deg, #a855f7, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 32px;
  }
  .login-box label {
    display: block;
    color: rgba(255,255,255,0.65);
    font-size: 0.85rem;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .login-box input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(124,58,237,0.25);
    border-radius: 10px;
    padding: 12px 14px;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    margin-bottom: 18px;
    outline: none;
    transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: #a855f7; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">TrustTop Up</div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:10px 14px;margin-bottom:16px;color:#f87171;font-size:0.9rem;">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST" action="{{ url_for('login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>Username / Email</label>
      <input type="text" name="username" placeholder="Masukkan username" required>
      <label>Password</label>
      <input type="password" name="password" placeholder="Masukkan password" required>
      <button type="submit" class="btn-topup"> LOGIN</button>
    </form>
    <div style="text-align:center;margin-top:20px;color:rgba(255,255,255,0.45);font-size:0.85rem;">
      Belum punya akun? <a href="#" style="color:#a855f7;">Daftar</a>
    </div>
  </div>
</div>
</body>
</html>
